program: run_ocr_experiments.py
method: grid
name: ocr-per-model-full-experiment
metric:
  name: full/best_test_char_acc
  goal: maximize
parameters:
  wandb_project:
    value: ocr-comparison
  max_words:
    value: 5000
  window_radii:
    value: 0,1,2
  splits:
    value: 1000:4000,2500:2500,4000:1000
  model:
    values:
      - auto_context
      - fixed_point
  num_repeats:
    value: 3
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - ${args}
